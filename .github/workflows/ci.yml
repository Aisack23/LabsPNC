name: CI

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main
      - develop

jobs:

  build-and-test:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Lab02PNC

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Make Maven Wrapper Executable
        run: chmod +x mvnw

      - name: Run Tests
        run: ./mvnw clean verify

      - name: Build Docker Image
        run: docker build -t wizard-app .
